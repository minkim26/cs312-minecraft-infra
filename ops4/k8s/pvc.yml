apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-pvc
  namespace: minecraft
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Must match the PV's storageClassName; empty string prevents the dynamic
  # provisioner from intercepting this claim.
  storageClassName: ""
  # Explicit binding to the static PV; prevents accidental binding to a
  # dynamically-provisioned volume with the same storage class.
  volumeName: minecraft-pv
