name: Build and publish Minecraft image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image from Dockerfile
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO:     ${{ secrets.ECR_REPO }}
          TAG:      ${{ github.ref_name }}
        run: |
          docker build -t $REGISTRY/$REPO:$TAG .

      - name: Smoke test — verify server initialises without errors
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO:     ${{ secrets.ECR_REPO }}
          TAG:      ${{ github.ref_name }}
        run: |
          docker run -d --name smoke-test \
            -e EULA=TRUE \
            -e VERSION=1.21.4 \
            -e MEMORY=1G \
            $REGISTRY/$REPO:$TAG
          echo "Polling for server startup (up to 120 s)..."
          for i in $(seq 1 12); do
            sleep 10
            if docker logs smoke-test 2>&1 | grep -q "Done"; then
              echo "PASSED: server started on attempt $i"
              docker stop smoke-test && docker rm smoke-test
              exit 0
            fi
            echo "Attempt $i/12: not ready yet"
          done
          echo "FAILED: server did not start within 120 seconds"
          docker logs smoke-test
          docker stop smoke-test && docker rm smoke-test
          exit 1

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO:     ${{ secrets.ECR_REPO }}
          TAG:      ${{ github.ref_name }}
        run: |
          docker push $REGISTRY/$REPO:$TAG
          echo "Successfully pushed $REGISTRY/$REPO:$TAG"
